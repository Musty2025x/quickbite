# ═══════════════════════════════════════════════════════════════
# QuickBite — Kubernetes Deployments & Services
# All microservices in one file for clarity
# ═══════════════════════════════════════════════════════════════

# ── API Gateway ───────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: quickbite
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: YOUR_ECR_ACCOUNT.dkr.ecr.us-east-1.amazonaws.com/quickbite/api-gateway:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: quickbite-secrets
                  key: JWT_SECRET
          envFrom:
            - configMapRef:
                name: quickbite-config
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: quickbite
spec:
  selector:
    app: api-gateway
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP

