# k8s/base/secrets.yaml
# ⚠️  Never commit real secrets — use AWS Secrets Manager or Sealed Secrets in production
# Generate base64: echo -n 'value' | base64
apiVersion: v1
kind: Secret
metadata:
  name: quickbite-secrets
  namespace: quickbite
type: Opaque
data:
  DB_HOST: <base64-encoded-rds-endpoint>
  DB_USER: <base64-encoded-db-user>
  DB_PASSWORD: <base64-encoded-db-password>
  JWT_SECRET: <base64-encoded-jwt-secret>
